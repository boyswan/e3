# e3 configuration

font:
  # Resolved by native font lookup on macOS and Fontconfig elsewhere.
  family: "MesloLGL Nerd Font"
  # Optional explicit font file. Leave empty to use `family`.
  path: ""
  size: 12

window:
  background: "#232326"
  foreground: "#E1E1E1"

pane:
  # SDL-only visual padding. Reserved for native pane layout work;
  # terminal cells are not offset by it yet.
  native_padding_px: 10
  # SDL-only border thickness, measured in pixels.
  native_border_px: 1

bar:
  # i3 default bar/workspace colors.
  background: "#000000"
  statusline: "#ffffff"
  separator: "#666666"
  focused_workspace: "#4c7899 #285577 #ffffff"
  active_workspace: "#333333 #5f676a #ffffff"
  inactive_workspace: "#333333 #222222 #888888"
  urgent_workspace: "#2f343a #900000 #ffffff"
  binding_mode: "#2f343a #900000 #ffffff"

palette:
  black: "0x181a1f"
  red: "0xe86671"
  green: "0x98c379"
  yellow: "0xe5c07b"
  blue: "0x61afef"
  magenta: "0xc678dd"
  cyan: "0x56b6c2"
  white: "0xabb2bf"
  bright_black: "0x5c6370"
  bright_red: "0xe86671"
  bright_green: "0x98c379"
  bright_yellow: "0xe5c07b"
  bright_blue: "0x61afef"
  bright_magenta: "0xc678dd"
  bright_cyan: "0x56b6c2"
  bright_white: "0xabb2bf"

input:
  # alt/option/opt or super/gui/cmd/command/meta
  mod: "super"
  # mod: "alt"

  # Key names are matched with the configured mod key.
  # Use "shift+<key>" for shifted bindings.
  quit: "q"
  split_right: "d"
  split_down: "shift+d"
  open_pane: "enter"
  close_pane: "w"
  dump_tree: "t"
  resize_mode: "r"
  fullscreen_toggle: "shift+f"
  layout_stacking: "shift+s"
  layout_tabbed: "shift+w"
  layout_toggle_split: "shift+e"
  focus_left: "h"
  focus_down: "j"
  focus_up: "k"
  focus_right: "l"
  move_left: "shift+h"
  move_down: "shift+j"
  move_up: "shift+k"
  move_right: "shift+l"
  workspace_1: "1"
  workspace_2: "2"
  workspace_3: "3"
  workspace_4: "4"
  workspace_5: "5"
  workspace_6: "6"
  workspace_7: "7"
  workspace_8: "8"
  workspace_9: "9"
