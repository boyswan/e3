# e3 theme translated from ./i3.config.yaml

font:
  family: "MesloLGL Nerd Font"
  path: ""
  size: 9

window:
  background: "#171717"
  foreground: "#C5C8C6"

shell:
  # command: "/bin/zsh"

pane:
  # The source i3 config uses `default_border pixel 1` and no gaps.
  native_padding_px: 0
  native_border_px: 1

# i3 client color order: border, background, text, indicator, child_border.
client:
  focused: "#383838 #171717 #51A8B3 #85678F #51A8B3"
  focused_inactive: "#383838 #171717 #51A8B3 #383838 #A7AAB0"
  unfocused: "#383838 #171717 #A7AAB0 #383838 #383838"
  urgent: "#383838 #e06c75 #383838 #e06c75 #e06c75"
  background: "#171717"

# The source has no bar block, so workspace states are mapped from its client
# colors to keep the e3 workspace bar consistent with the window decorations.
bar:
  background: "#171717"
  statusline: "#C5C8C6"
  separator: "#383838"
  focused_workspace: "#383838 #171717 #51A8B3"
  active_workspace: "#383838 #171717 #51A8B3"
  inactive_workspace: "#383838 #171717 #A7AAB0"
  urgent_workspace: "#383838 #e06c75 #383838"
  binding_mode: "#383838 #e06c75 #383838"

palette:
  black: "0x383838"
  red: "0xe06c75"
  green: "0x98c379"
  yellow: "0xe5c07b"
  blue: "0x51A8B3"
  magenta: "0x85678F"
  cyan: "0x56b6c2"
  white: "0xC5C8C6"
  bright_black: "0xA7AAB0"
  bright_red: "0xe06c75"
  bright_green: "0x98c379"
  bright_yellow: "0xe5c07b"
  bright_blue: "0x51A8B3"
  bright_magenta: "0x85678F"
  bright_cyan: "0x56b6c2"
  bright_white: "0xC5C8C6"

input:
  # Mod4 in the source i3 config.
  mod: "super"

  quit: "q"
  split_right: "d"
  split_down: "shift+d"
  open_pane: "enter"
  close_pane: "w"
  dump_tree: "t"
  resize_mode: "r"
  fullscreen_toggle: "shift+f"
  layout_stacking: "shift+s"
  layout_tabbed: "shift+w"
  layout_toggle_split: "shift+e"
  focus_left: "h"
  focus_down: "j"
  focus_up: "k"
  focus_right: "l"
  move_left: "shift+h"
  move_down: "shift+j"
  move_up: "shift+k"
  move_right: "shift+l"
  workspace_1: "1"
  workspace_2: "2"
  workspace_3: "3"
  workspace_4: "4"
  workspace_5: "5"
  workspace_6: "6"
  workspace_7: "7"
  workspace_8: "8"
  workspace_9: "9"
  move_to_workspace_1: "shift+1"
  move_to_workspace_2: "shift+2"
  move_to_workspace_3: "shift+3"
  move_to_workspace_4: "shift+4"
  move_to_workspace_5: "shift+5"
  move_to_workspace_6: "shift+6"
  move_to_workspace_7: "shift+7"
  move_to_workspace_8: "shift+8"
  move_to_workspace_9: "shift+9"
